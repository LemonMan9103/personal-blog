<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Contact - LemonMan9103</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="logo">LemonMan9103</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">Toggle</button>
        <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
      </div>
    </div>
  </nav>

  <header class="page-header" style="background-image:linear-gradient(180deg, rgba(2,6,15,0.6), rgba(2,6,15,0.35)), url('https://images.unsplash.com/photo-1496307042754-b4aa456c4a2d?auto=format&fit=crop&w=1600&q=60'); background-size:cover;">
    <div class="container">
      <h1>Contact</h1>
      <p style="color:var(--muted)">Let's build something interesting.</p>
    </div>
  </header>

  <section class="contact-section">
    <div class="container" style="max-width:900px;margin:0 auto;">
      <div class="contact-form-wrapper">
        <form class="contact-form" action="#" method="POST">
          <div class="form-group">
            <label for="name">Your name</label>
            <input id="name" name="name" type="text" placeholder="Jane Developer" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="jane@example.com" required />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" placeholder="Tell me about your project" required></textarea>
          </div>
          <div style="display:flex;gap:12px;align-items:center">
            <button class="btn btn-primary" type="submit">Send Message</button>
            <p style="color:var(--muted);margin:0">You can also reach me on GitHub or LinkedIn.</p>
          </div>
        </form>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container"><p>&copy; 2026 LemonMan9103</p></div>
  </footer>

  <script src="assets/js/theme.js"></script>
  <script src="script.js"></script>
</body>
</html>
